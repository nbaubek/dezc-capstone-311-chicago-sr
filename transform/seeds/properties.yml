seeds:
  # Source of community areas geography data: https://data.cityofchicago.org/Facilities-Geographic-Boundaries/Boundaries-Community-Areas/igwz-8jzy/about_data
  - name: community_areas
    description: "Chicago's 77 community areas with geographic boundaries and metadata"
    columns:
      - name: area_number
        tests:
          - unique
          - not_null
      - name: area_name
        tests:
          - unique
          - not_null
      - name: side
        tests:
          - not_null
      - name: the_geom
        description: "MULTIPOLYGON WKT geometry for community area boundary"
      - name: shape_area
        description: "Area of the community boundary in square degrees"
      - name: shape_len
        description: "Perimeter length of the community boundary"

  - name: sla_targets
    description: "SLA targets and priority levels for each service request type"
    columns:
      - name: sr_type
        tests:
          - unique
          - not_null
      - name: target_days
      - name: priority
      - name: sla_target_source

  - name: department_metadata
    description: "Department display names and bureau groupings derived from stg_service_requests"
    columns:
      - name: owner_department
        tests:
          - unique
          - not_null
      - name: display_name
      - name: bureau
