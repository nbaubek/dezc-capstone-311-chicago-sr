# dbt project configuration for Chicago 311 Analytics
name: "chicago_311_sr_analytics"
version: "1.0.0"
config-version: 2

profile: chicago_311

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  chicago_311_sr_analytics:
    staging:
      +materialized: view
      +schema: staging
      +tags: ["staging"]

    intermediate:
      +materialized: view
      +schema: intermediate
      +tags: ["intermediate"]

    marts:
      +materialized: table
      +schema: marts
      +catalog_name: bigquery_iceberg_catalog

    core:
      +materialized: table
      +schema: core
      +catalog_name: bigquery_iceberg_catalog

    operations:
      +materialized: table
      +schema: operations
      +catalog_name: bigquery_iceberg_catalog

    facts:
      +materialized: table
      +schema: facts
      +catalog_name: bigquery_iceberg_catalog
      +incremental_strategy: merge

    dimensions:
      +materialized: table
      +schema: dimensions
      +catalog_name: bigquery_iceberg_catalog

seeds:
  chicago_311_sr_analytics:
    +schema: seeds

tests:
  chicago_311_sr_analytics:
    +schema: tests

snapshots:
  chicago_311_sr_analytics:
    +schema: snapshots

on-run-start:
  - "{{ create_schema_if_not_exists(target.database, target.schema) }}"
