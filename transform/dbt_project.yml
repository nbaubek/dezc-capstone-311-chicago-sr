# dbt project configuration for Chicago 311 Analytics
name: "chicago_311_sr_analytics"
version: "1.0.0"
config-version: 2

profile: chicago_311

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  chicago_311_sr_analytics:
    staging:
      +materialized: view
      +schema: staging
      +tags: ["staging"]

    dimensions:
      +materialized: table
      +schema: dimensions

    facts:
      +materialized: table
      +schema: facts
      +incremental_strategy: merge

    marts:
      +materialized: table
      +schema: marts

seeds:
  chicago_311_sr_analytics:
    +schema: seeds

tests:
  chicago_311_sr_analytics:
    +schema: tests

