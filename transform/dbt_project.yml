# dbt project configuration for Chicago 311 Analytics
name: '311_sr_analytics'
version: '1.0.0'
config-version: 2

profile: 'chicago_311'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  311_sr_analytics:
    staging:
      +materialized: view
      +schema: staging
      +tags: ["staging"]

    intermediate:
      +materialized: table
      +schema: intermediate
      +tags: ["intermediate"]

    marts:
      +materialized: table
      +schema: marts

seeds:
  311_sr_analytics:
    +schema: seeds

tests:
  311_sr_analytics:
    +schema: tests

snapshots:
  311_sr_analytics:
    +schema: snapshots

on-run-start:
  - "{{ create_schema_if_not_exists(target.database, target.schema) }}"

on-run-end:
  - "{{ run_query('GRANT SELECT ON ALL TABLES IN SCHEMA ' ~ target.schema ~ ' TO \"data_analyst\"') }}"
