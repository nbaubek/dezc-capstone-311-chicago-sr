version: 2

models:
  - name: dim_date
    description: >
      Date dimension table for the Chicago 311 data warehouse. One row per day from 2024-01-01
      to 2026-12-31. SCD Type 0 — dates are immutable by definition. Includes Illinois state
      holidays and business-day flags needed for SLA resolution time calculations (BR-004).
    config:
      tags: ['dimensions']

    columns:
      - name: date_day
        description: "The calendar date (YYYY-MM-DD). Primary key of this dimension."
        tests:
          - unique
          - not_null

      - name: date_year
        description: "Year extracted from date_day (e.g., 2024)."

      - name: date_month
        description: "Month number (1-12) extracted from date_day."

      - name: month_name
        description: "Full month name (e.g., 'January', 'February')."

      - name: day_of_month
        description: "Day of the month (1-31)."

      - name: day_of_week_num
        description: "Day of week as a number. BigQuery convention: 1=Sunday through 7=Saturday."

      - name: day_of_week_name
        description: "Full day of week name (e.g., 'Monday', 'Saturday')."

      - name: date_quarter
        description: "Fiscal quarter number (1-4)."

      - name: day_of_year
        description: "Day of year (1-366), useful for trend analysis."

      - name: is_weekend
        description: "True if day_of_week_num is 1 (Sunday) or 7 (Saturday). Used in BR-004 business-day exclusion."

      - name: is_illinois_holiday
        description: "True if the date is an official Illinois state holiday. Covers all holidays within the project scope (2024-2026). Used in BR-004 business-day exclusion."

      - name: is_business_day
        description: "True only when is_weekend=false AND is_illinois_holiday=false. The master flag for BR-004 business-day resolution time calculations."

  - name: dim_department
    description: >
      Department dimension table for Chicago 311 service requests. Derives unique departments
      from stg_service_requests and enriches them with display names and bureau groupings from
      the department_metadata seed. SCD Type 0 — departments are slowly-changing reference
      data, regenerated on each dbt run.
    config:
      tags: ['dimensions']

    columns:
      - name: department_id
        description: "Surrogate key generated via farm_fingerprint(owner_department). Primary key."
        tests:
          - not_null

      - name: raw_department_name
        description: "The raw department name exactly as it appears in the Socrata API. Retained for lineage and debugging."

      - name: department_name
        description: "Cleaned and standardized department display name. Falls back to raw_department_name if no match in department_metadata seed."

      - name: bureau
        description: "The parent bureau/division grouping for the department. Null if not matched in seed."

      - name: dbt_updated_at
        description: "Audit timestamp indicating when this dimension record was last processed by dbt."
        tests:
          - not_null

  - name: dim_geography
    description: >
      Geographical dimension table for Chicago 311 service requests. One row per community area (77 total),
      sourced from the community_areas seed. Contains the official spatial Multipolygon and macro-regions
      (City Sides). SCD Type 0 — geographic boundaries are stable.
      IMPORTANT: This dimension must maintain exactly ONE row per community_area_id (enforced by a unique test).
      Ward is NOT included here — it is a direct column on fct_service_requests to avoid fan-out joins.
    config:
      tags: ['dimensions', 'spatial']

    columns:
      - name: community_area_id
        description: "The official numeric ID (1-77) representing a Chicago Community Area. Primary key — enforced unique."
        tests:
          - unique
          - not_null

      - name: community_area_name
        description: "The human-readable text name of the Community Area (e.g., 'Rogers Park', 'Loop')."

      - name: city_side
        description: "The macro-region of Chicago the community area belongs to (e.g., 'North', 'South', 'West'). Useful for high-level dashboard aggregations."

      - name: area_boundary
        description: "Native BigQuery GEOGRAPHY object (Multipolygon) representing the exact Community Area borders. Optimized for BI choropleth mapping via ST_GEOGFROMTEXT()."

      - name: shape_area
        description: "The total area of the Community Area boundary, measured in square degrees."

      - name: shape_length
        description: "The perimeter length of the Community Area boundary."

      - name: dbt_updated_at
        description: "Audit timestamp indicating when this dimension record was processed by dbt."
        tests:
          - not_null

  - name: dim_request_type
    description: >
      Request type dimension table for Chicago 311 service requests. Derives unique request
      types from stg_service_requests and enriches them with SLA targets and priority levels
      from the sla_targets seed. SCD Type 0 — request type definitions are stable, regenerated
      on each dbt run.
    config:
      tags: ['dimensions']

    columns:
      - name: request_type_id
        description: "Surrogate key generated via farm_fingerprint(sr_type). Primary key."
        tests:
          - not_null

      - name: request_type_name
        description: "The full request type name as it appears in the Socrata API (e.g., 'Pothole in Street Complaint')."

      - name: sr_short_code
        description: "The abbreviated short code for the service type."

      - name: sla_target_days
        description: "The target number of days to resolve a request of this type. Pulled from sla_targets seed."

      - name: priority_level
        description: "Priority tier (Critical/High/Medium/Low) for the request type. Used for SLA benchmarking and alerting."

      - name: sla_target_source
        description: "Reference or assumption basis for the SLA target days (e.g., 'City service standard estimate')."

      - name: dbt_updated_at
        description: "Audit timestamp indicating when this dimension record was processed by dbt."
        tests:
          - not_null

  - name: dim_status
    description: >
      Request status dimension table for Chicago 311 service requests. Derives unique
      ticket statuses from stg_service_requests. SCD Type 0 — status values are enumerated
      by the source system and immutable. Provides a stable reference for status-based
      filtering and aggregations in reporting.
    config:
      tags: ['dimensions']

    columns:
      - name: status_id
        description: "Surrogate key generated via farm_fingerprint(current_status). Primary key."
        tests:
          - not_null

      - name: status_name
        description: "The ticket status value as it appears in the Socrata API (e.g., 'Open', 'Completed', 'Closed')."

      - name: dbt_updated_at
        description: "Audit timestamp indicating when this dimension record was processed by dbt."
        tests:
          - not_null
